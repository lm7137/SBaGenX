name: Stable Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag version (e.g., v1.5.6)"
        required: true
        type: string

permissions:
  contents: read
  actions: read

jobs:
  build-linux-windows:
    runs-on: ubuntu-latest

    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract version from tag
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.tag }}"
            VERSION=${VERSION#v}  # Remove 'v' prefix
          else
            VERSION=${GITHUB_REF#refs/tags/v}  # Remove 'refs/tags/v' prefix
          fi

          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "tag_version=v${VERSION}" >> $GITHUB_OUTPUT
          echo "Stable version: ${VERSION}"

          # Update VERSION file for consistency
          echo $VERSION > VERSION

      - name: Build for Linux and Windows
        run: |
          mkdir -p artifacts

          # Run build using docker compose
          docker compose run --rm build

          # Copy generated artifacts with version suffix
          if [ -f "dist/sbagenx-linux64" ]; then
            cp dist/sbagenx-linux64 artifacts/sbagenx-linux64
          fi

          if [ -f "dist/sbagenx-linux32" ]; then
            cp dist/sbagenx-linux32 artifacts/sbagenx-linux32
          fi

          if [ -f "dist/sbagenx-windows-setup.exe" ]; then
            cp dist/sbagenx-windows-setup.exe artifacts/sbagenx-windows-setup.exe
          fi

      - name: Generate SHA256 checksums
        run: |
          cd artifacts
          find . -type f -exec sha256sum {} \; | sort > ../checksums.txt
          cat ../checksums.txt

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sbagenx-stable-${{ steps.version.outputs.version }}
          path: |
            artifacts/
            checksums.txt
          retention-days: 90

  build-macos:
    runs-on: macos-latest

    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: |
          # Install required tools via Homebrew
          brew install automake autoconf libtool pandoc create-dmg

      - name: Extract version from tag
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.tag }}"
            VERSION=${VERSION#v}  # Remove 'v' prefix
          else
            VERSION=${GITHUB_REF#refs/tags/v}  # Remove 'refs/tags/v' prefix
          fi

          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "tag_version=v${VERSION}" >> $GITHUB_OUTPUT
          echo "Stable version: ${VERSION}"

          # Update VERSION file for consistency
          echo $VERSION > VERSION

      - name: Build libraries for macOS
        run: |
          ./macos-build-libs.sh

      - name: Build SBaGenX for macOS
        run: |
          ./macos-build-sbagenx.sh

      - name: Create macOS installer
        run: |
          ./macos-create-installer.sh

      - name: Prepare artifacts
        run: |
          mkdir -p artifacts

          # Copy DMG installer with version
          if [ -f "dist/SBaGenX-Installer.dmg" ]; then
            cp dist/SBaGenX-Installer.dmg artifacts/SBaGenX-Installer.dmg
          fi

      - name: Generate SHA256 checksums
        run: |
          cd artifacts
          find . -type f -exec shasum -a 256 {} \; | sort > ../checksums-macos.txt
          cat ../checksums-macos.txt

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sbagenx-macos-stable-${{ steps.version.outputs.version }}
          path: |
            artifacts/
            checksums-macos.txt
          retention-days: 90
